<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Notificare Quiz - BlueLearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8 text-center">
            <div class="mx-auto w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>

            <h1 class="text-2xl font-black text-gray-900 mb-4">{{ titlu }}</h1>
            <p class="text-gray-600 mb-8 leading-relaxed">
                {{ mesaj }}
            </p>

            <div class="space-y-3">
                <a href="/dashboard" class="block w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                    Mergi la Dashboard
                </a>
                <a href="/lectii" class="block w-full py-4 bg-gray-50 text-gray-500 rounded-2xl font-bold hover:bg-gray-100 transition border border-gray-200">
                    Înapoi la Lecții
                </a>
            </div>
        </div>
        
        <div class="h-2 bg-blue-600"></div>
    </div>

</body>
</html>
