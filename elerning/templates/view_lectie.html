<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>{{ lectie.titlu }} - BlueLearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-600 p-4 text-white shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between">
            <a href="/lectii" class="font-bold">← Înapoi la listă</a>
            <span class="bg-blue-800 px-3 py-1 rounded text-sm">{{ lectie.capitol }}</span>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto bg-white p-8 mt-10 rounded-2xl shadow-lg">
        <h1 class="text-3xl font-bold text-blue-700 mb-6">{{ lectie.titlu }}</h1>
        
        <div class="text-gray-800 leading-relaxed mb-8 text-lg">
            {{ lectie.continut }}
        </div>

        {% if lectie.exemplu_cod %}
        <div class="bg-gray-900 rounded-xl p-6 my-6 font-mono text-green-400">
            <p class="text-gray-500 text-xs mb-2">// Exemplu de cod Python:</p>
            <pre class="whitespace-pre-wrap">{{ lectie.exemplu_cod }}</pre>
        </div>
        {% endif %}

        <div class="mt-10 pt-6 border-t border-gray-100 flex justify-center">
            <a href="/quiz/{{ lectie.id }}" class="bg-blue-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">
                Vreau să dau Quiz-ul! 📝
            </a>
        </div>
    </div>
</body>
</html>
