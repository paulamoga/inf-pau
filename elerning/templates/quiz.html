<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Quiz - BlueLearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 min-h-screen p-6">
    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-900">Quiz: {{ lectie.titlu }}</h1>
            <a href="/lectii" class="text-gray-500 hover:text-red-500">Abandonează</a>
        </div>

        <form action="/submit_quiz/{{ lectie_id }}" method="POST" class="space-y-6">
            {% for q in intrebari %}
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-blue-100">
                <!-- AM SCHIMBAT AICI: q.intrebare -->
                <h2 class="text-xl font-bold text-gray-800 mb-6">{{ loop.index }}. {{ q.intrebare }}</h2>

                <div class="grid gap-4">
                    <!-- Varianta 1 -->
                    <label class="flex items-center p-4 border-2 border-gray-100 rounded-2xl cursor-pointer hover:bg-blue-50 transition">
                        <input type="radio" name="q{{ q.id }}" value="1" required class="w-5 h-5">
                        <span class="ml-4 text-gray-700">{{ q.varianta1 }}</span>
                    </label>

                    <!-- Varianta 2 -->
                    <label class="flex items-center p-4 border-2 border-gray-100 rounded-2xl cursor-pointer hover:bg-blue-50 transition">
                        <input type="radio" name="q{{ q.id }}" value="2" required class="w-5 h-5">
                        <span class="ml-4 text-gray-700">{{ q.varianta2 }}</span>
                    </label>

                    <!-- Varianta 3 -->
                    <label class="flex items-center p-4 border-2 border-gray-100 rounded-2xl cursor-pointer hover:bg-blue-50 transition">
                        <input type="radio" name="q{{ q.id }}" value="3" required class="w-5 h-5">
                        <span class="ml-4 text-gray-700">{{ q.varianta3 }}</span>
                    </label>

                    <!-- Varianta 4 (Am adăugat-o pentru că o ai în DB) -->
                    {% if q.varianta4 %}
                    <label class="flex items-center p-4 border-2 border-gray-100 rounded-2xl cursor-pointer hover:bg-blue-50 transition">
                        <input type="radio" name="q{{ q.id }}" value="4" required class="w-5 h-5">
                        <span class="ml-4 text-gray-700">{{ q.varianta4 }}</span>
                    </label>
                    {% endif %}
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl hover:bg-blue-700 shadow-lg transition">
                Trimite Răspunsurile
            </button>
        </form>
    </div>
</body>
</html>
