<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare - BlueLearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 flex flex-col items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="flex flex-col items-center mb-6">
            <img src="{{ url_for('static', filename='balena.png') }}" 
                 alt="Logo BlueLearn" 
                 class="w-20 h-20 object-contain mb-2">
            <h2 class="text-2xl font-bold text-blue-600">Creează Cont</h2>
        </div>

        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Nume Utilizator</label>
                <input type="text" name="username" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <p class="text-xs text-gray-500 mt-1 italic">* Minim 3 caractere.</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Adresa Email</label>
                <input type="email" name="email" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Parolă</label>
                <input type="password" name="password" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition shadow-lg">
                Înregistrare Cont Nou
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Ai deja cont? <a href="/login" class="text-blue-500 hover:underline font-bold">Autentifică-te</a>
        </p>
    </div>

</body>
</html>
