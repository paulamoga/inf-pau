<!-- templates/dashboard.html -->
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BlueLearn</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Bara de Navigare -->
 <nav class="bg-blue-600 p-4 text-white shadow-lg">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <h1 class="font-bold text-xl">BlueLearn</h1>
        <div class="flex items-center space-x-4">
            <span class="text-sm opacity-90">Salut, {{ user['nume'] }}!</span>
            <!-- MODIFICARE AICI: Schimbăm "/" cu "/logout" -->
            <a href="/logout" class="text-sm bg-red-500 hover:bg-red-600 px-3 py-1 rounded transition font-semibold">
                Logout
            </a>
        </div>
    </div>
</nav>

    <!-- Conținut Dashboard -->
    <div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md">
        <div class="flex items-center space-x-6 mb-8">
            <!-- Cercul cu Nivelul (Am corectat din 'level' in 'user.nivel') -->
            <div class="bg-gradient-to-br from-blue-500 to-indigo-600 text-white w-24 h-24 flex flex-col items-center justify-center rounded-full shadow-lg border-4 border-white">
                <span class="text-xs uppercase font-bold opacity-80">Nivel</span>
                <span class="text-3xl font-black">{{ user['nivel'] }}</span>
            </div>
            
            <div class="flex-1">
                <h2 class="text-2xl font-bold text-gray-800">Progresul tău</h2>
                <p class="text-gray-500">Continuă să înveți pentru a debloca niveluri noi!</p>
            </div>
        </div>

        <!-- Statistici XP -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="p-4 bg-blue-50 rounded-lg border border-blue-100 shadow-sm">
                <div class="text-blue-600 text-sm font-semibold uppercase tracking-wider">Experiență Totală</div>
                <div class="text-3xl font-bold text-blue-900">{{ user['xp'] }} <span class="text-lg font-medium">XP</span></div>
            </div>
            
            <div class="p-4 bg-indigo-50 rounded-lg border border-indigo-100 shadow-sm">
                <div class="text-indigo-600 text-sm font-semibold uppercase tracking-wider">Statut Nivel</div>
                <div class="text-3xl font-bold text-indigo-900">Nivel {{ user['nivel'] }}</div>
            </div>
        </div>
        
        <div class="border-t pt-8 text-center">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">Ești gata pentru o nouă provocare?</h2>
            <a href="/lectii" class="inline-block bg-green-500 text-white px-10 py-4 rounded-xl font-bold hover:bg-green-600 transform hover:scale-105 transition shadow-lg">
                🚀 Vezi Lecțiile și Quiz-urile
            </a>
        </div>
    </div>

</body>
</html>
