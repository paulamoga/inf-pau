<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueLearn - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 flex flex-col items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        
        <!-- Logo-ul cu Balenă -->
        <div class="flex justify-center mb-6">
            <img src="{{ url_for('static', filename='balena.png') }}" 
                 alt="Logo BlueLearn" 
                 class="w-32 h-32 object-contain drop-shadow-md">
        </div>

        <h2 class="text-3xl font-extrabold text-blue-600 mb-2">BlueLearn</h2>
        <p class="text-gray-500 mb-8 text-sm">Introdu datele pentru a intra în cont</p>

        <!-- Modificare: action="/login" trimite datele către ruta corectă din app.py -->
        <form action="/login" method="POST" class="space-y-4 text-left">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Utilizator</label>
                <input type="text" name="username" placeholder="Numele tău" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Parolă</label>
                <input type="password" name="password" placeholder="••••••••" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg transition duration-300 shadow-md">
                Conectare
            </button>
        </form>

        <hr class="my-6 border-gray-200">

        <p class="text-sm text-gray-600">
            Nu ai un cont încă? 
            <a href="/register" class="text-blue-500 font-bold hover:underline">Creează unul acum</a>
        </p>
    </div>

</body>
</html>
